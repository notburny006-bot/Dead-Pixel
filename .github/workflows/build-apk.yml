name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v3
        with:
          python-version: '3.10'

      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential git python3-dev libffi-dev unzip zip openjdk-17-jdk

      - name: Set up Java
        run: echo "JAVA_HOME=/usr/lib/jvm/java-17-openjdk-amd64" >> $GITHUB_ENV

      - name: Install Python deps
        run: |
          pip install --upgrade pip
          pip install buildozer cython==0.29.37

      - name: Accept Android SDK licenses
        run: |
          mkdir -p ~/.android
          echo "count=0" > ~/.android/repositories.cfg
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses || true

      - name: Cache buildozer
        uses: actions/cache@v4
        with:
          path: |
            ~/.buildozer
            .buildozer
          key: buildozer-v5-${{ hashFiles('buildozer.spec') }}
          restore-keys: buildozer-v5-

      - name: Pre-install build-tools into buildozer SDK
        run: |
          SDK_DIR="$HOME/.buildozer/android/platform/android-sdk"
          if [ -d "$SDK_DIR/tools/bin" ]; then
            yes | $SDK_DIR/tools/bin/sdkmanager --sdk_root="$SDK_DIR" "build-tools;33.0.2" "platforms;android-33" || true
          else
            echo "Buildozer SDK not yet present — will be installed during build"
          fi

      - name: Clean old builds
        run: rm -rf bin/ .buildozer/android/platform/build-*/

      - name: Build APK
        run: |
          set -o pipefail
          buildozer android debug 2>&1 | tee build.log
        timeout-minutes: 60

      - name: Find APK
        if: always()
        run: |
          echo "=== Searching for APK files ==="
          find bin/ -name "*.apk" -type f 2>/dev/null
          mkdir -p artifacts
          cp bin/*.apk artifacts/ 2>/dev/null || true
          echo "=== artifacts/ contents ==="
          ls -la artifacts/ 2>/dev/null || echo "No artifacts dir"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: dead-pixel-apk
          path: artifacts/*.apk
          if-no-files-found: error

      - name: Upload build log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build.log
