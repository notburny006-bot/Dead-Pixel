name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential git python3-dev libffi-dev

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install build tools
        run: |
          sdkmanager --install "build-tools;33.0.2" "platforms;android-33"
        env:
          ANDROID_HOME: /usr/local/lib/android/sdk

      - name: Install Python deps
        run: |
          pip install buildozer cython==0.29.37

      - name: Init git for python-for-android
        run: |
          mkdir -p .buildozer/android/platform
          cd .buildozer/android/platform
          git clone --depth 1 https://github.com/kivy/python-for-android.git
          cd python-for-android
          git config user.email "ci@build.com"
          git config user.name "CI"

      - name: Build APK
        run: |
          buildozer android debug
        timeout-minutes: 30

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: dead-pixel-apk
          path: bin/*.apk
